<section class="hero-section">
    <div class="main-content-container center-content">
        <h2> Sign up and explore world of toys </h2>

        <form id="signup-form" [formGroup]="form" (ngSubmit)="onSubmit()">
            <div class="input-fields-wrapper">  
                <input type="text" placeholder="Full name" formControlName="fullName" class="input-field">
                <input type="email" placeholder="Email address" formControlName="email" class="input-field">
                <input type="tel" placeholder="Phone number" formControlName="phone" class="input-field">
                <input type="text" placeholder="Street" formControlName="street" class="input-field">
                <select formControlName="favoriteToys" id="favoriteToys" class="input-field">
                    @for (favoriteToy of favoriteToys(); track $index) {
                        <option [value]="favoriteToy"> {{favoriteToy}} </option>
                    }
                </select>
                <input type="password" placeholder="Password" formControlName="password" class="input-field">
            </div>
            <button type="submit" id="signup-button" class="primary-button"> Sign up now </button>
        </form>
        <a routerLink="/login" class="secondary-button-yellow top-margin-16"> Log in if you already have an acconut </a> 
    </div>
</section>
